<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>AOS GPS Navigácia - HUD</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene
      vr-mode-ui="enabled: false"
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false;">

      <!-- 1. JEDÁLEŇ AOS -->
      <a-entity gps-entity-place="latitude: 49.065761; longitude: 19.587401;" look-at="[gps-camera]" scale="15 15 15">
        <!-- Čierny polopriehľadný rámček -->
        <a-plane color="#000000" opacity="0.7" width="1.6" height="0.4" position="0 0 0"></a-plane>
        <!-- Text (posunutý o milimeter dopredu aby neblikal s rámčekom) -->
        <a-text value="JEDALEN AOS" align="center" color="#FFFFFF" width="4" position="0 0 0.15" material="depthTest: false"></a-text>
      </a-entity>

      <!-- 2. INTERNÁTY-BLOK A  -->
      <a-entity gps-entity-place="latitude: 49.07580; longitude: 19.35119;" look-at="[gps-camera]" scale="15 15 15">
        <a-plane color="#000000" opacity="0.7" width="2.2" height="0.4" position="0 0 0"></a-plane>
        <a-text value="INTERNATY-BLOK A" align="center" color="#00CCFF" width="4" position="0 0 0.15" material="depthTest: false"></a-text>
      </a-entity>

      <!-- 3. INTERNÁTY-BLOK B -->
      <a-entity gps-entity-place="latitude: 49.063903; longitude: 19.586144;" look-at="[gps-camera]" scale="15 15 15">
        <a-plane color="#000000" opacity="0.7" width="2.2" height="0.4" position="0 0 0"></a-plane>
        <a-text value="INTERNATY-BLOK B" align="center" color="#00CCFF" width="4" position="0 0 0.15" material="depthTest: false"></a-text>
      </a-entity>

      <!-- 4. SPOJOVACÍ KRČOK -->
      <a-entity gps-entity-place="latitude: 49.064296; longitude: 19.587742;" look-at="[gps-camera]" scale="12 12 12">
        <a-plane color="#000000" opacity="0.7" width="2" height="0.4" position="0 0 0"></a-plane>
        <a-text value="SPOJOVACI KRCOKk" align="center" color="#FFCC00" width="4" position="0 0 0.15" material="depthTest: false"></a-text>
      </a-entity>

      <a-camera gps-camera rotation-reader></a-camera>

    </a-scene>
  </body>
</html>
